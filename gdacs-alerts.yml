name: GDACS Alerts to Slack Workflow
on:
push:
  branches: [ main ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install requests
    - name: Check GDACS & trigger Slack
      env:
        SLACK_TRIGGER_URL: ${{ secrets.SLACK_TRIGGER_URL }}
      run: python gdacs_slack.py
